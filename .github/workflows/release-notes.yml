name: Auto Release Notes

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch release branch
        run: git fetch origin release

      - name: Cleanup old branch
        run: |
          BRANCH="docs/release-notes-$(date +%Y-%m-%d)"
          git push origin --delete "$BRANCH" 2>/dev/null || echo "Nessun branch precedente da eliminare"

      - name: Check for diff
        id: diff
        run: |
          DIFF=$(git log main..origin/release --oneline --no-merges --format="%h %s" 2>/dev/null || echo "")
          FILES=$(git diff --name-only main..origin/release 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "Nessuna diff trovata"
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
            echo "$DIFF" > /tmp/diff.txt
            echo "$FILES" > /tmp/files.txt
            echo "Diff trovate:"
            echo "$DIFF"
            echo "File modificati:"
            echo "$FILES"
          fi

      - name: Install Ollama
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Pull model
        if: steps.diff.outputs.has_diff == 'true'
        run: ollama pull mistral

      - name: Generate release notes
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          cat > /tmp/generate.py << 'SCRIPT'
          import json
          import urllib.request
          import datetime
          import os

          today = datetime.date.today().isoformat()

          template_path = "docs/release-notes-template.md"
          template = ""
          if os.path.exists(template_path):
              template = open(template_path).read()
          else:
              template = "## [Data] - Release Notes\n### Features\n### Fix\n### Improvements\n### ⚠️ Breaking Changes"

          diff = open("/tmp/diff.txt").read()
          files = open("/tmp/files.txt").read()
          
          prompt = f"""Sei un agente che genera release notes per il progetto Data Platform.
          
          SCHEMA DA SEGUIRE ESATTAMENTE:
          {template}
          
          REGOLE:
          - Data di oggi: {today}
          - Analizza i FILE MODIFICATI per capire quali cartelle sotto code/layers/ sono coinvolte
          - Ogni cartella trovata (es. promotion, mga, ecc.) diventa una SEZIONE nel markdown
            con le sue Breaking Changes e Non-Breaking Changes
          - Una modifica è BREAKING se: cambia API pubbliche, rimuove campi/endpoint,
            modifica contratti dati, o il commit contiene "BREAKING CHANGE" o "!"
          - Se una sezione non ha breaking changes, scrivi `NONE`
          - Se una sezione non ha non-breaking changes, scrivi `NONE`
          - Rispondi SOLO con il markdown, nessun commento aggiuntivo
          
          COMMIT:
          {diff}
          
          FILE MODIFICATI:
          {files}
          
          OUTPUT (markdown):"""

          payload = json.dumps({
              "model": "mistral",
              "prompt": prompt,
              "stream": False,
              "options": {"temperature": 0.2}
          }).encode()

          req = urllib.request.Request(
              "http://localhost:11434/api/generate",
              data=payload,
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=300) as resp:
              result = json.loads(resp.read())["response"]

          output_path = "docs/release-notes.md"
          os.makedirs("docs", exist_ok=True)
          with open(output_path, "w") as f:
              f.write(result)

          print("Release notes generate con successo")
          SCRIPT
          python3 /tmp/generate.py

      - name: Create PR
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/release-notes-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/release-notes.md
          git diff --cached --quiet && echo "Nessuna modifica" && exit 0
          git commit -m "docs: auto-generate release notes $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "📝 Release Notes $(date +%Y-%m-%d)" \
            --body "Release notes auto-generate dal diff main..release" \
            --base release \
            --head "$BRANCH"

      - name: Approve PR
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_APPROVE }}
        run: |
          BRANCH="docs/release-notes-$(date +%Y-%m-%d)"
          gh pr review "$BRANCH" --approve

      - name: Merge PR
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/release-notes-$(date +%Y-%m-%d)"
          gh pr merge "$BRANCH" --squash --delete-branch

      - name: Cleanup on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/release-notes-$(date +%Y-%m-%d)"
          # Chiudi la PR se esiste
          gh pr close "$BRANCH" 2>/dev/null || true
          # Elimina il branch remoto
          git push origin --delete "$BRANCH" 2>/dev/null || true
          echo "Cleanup completato"
